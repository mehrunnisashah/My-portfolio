    <h1 class="abt">Contact Me</h1>
    <hr>

    <div class="contact-card">

        <div style="display:flex; gap:16px;">
            <div class="form-group" style="flex:1;">
                <label>Name</label>
                <input type="text" placeholder=" Name" />
            </div>
            <div class="form-group" style="flex:1;">
                <label>Email</label>
                <input type="email" placeholder="email@example.com" />
            </div>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input type="text" placeholder="Subject " />
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea placeholder=" Message"></textarea>
        </div>

        <button class="send-btn">Send Message</button>

        <div style="text-align:center; margin:1.5rem 0 1rem; color:#475569; font-size:13px;">
            — ya social media pe bhi contact karein —
        </div>

        <div class="social-row">
            <a href="https://github.com" class="social-btn">GitHub</a>
            <a href="https://linkedin.com" class="social-btn">LinkedIn</a>
            <a href="https://instagram.com" class="social-btn">Instagram</a>
        </div>

    </div>
