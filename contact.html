<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <nav class="nav-link">
        <h1>Port<span>folio</span></h1>
        <div>
            <a href="index.html">home</a>
            <a href="about.html">about</a>
            <a href="skill.html">skill</a>
            <a href="contact.html" class="active">contact</a>
        </div>
    </nav>

    <h1 class="abt">Contact Me</h1>
    <hr>

    <div class="contact-card">

        <div class="form-row">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Name" />
                <span class="err-msg" id="name-err">Name zaroor likhein</span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@example.com" />
                <span class="err-msg" id="email-err">Sahi email likhein</span>
            </div>
        </div>

        <div class="form-group">
            <label>Subject</label>
            <input type="text" id="subject" placeholder="Subject " />
            <span class="err-msg" id="subject-err">Subject zaroor likhein</span>
        </div>

        <div class="form-group">
            <label>Message</label>
            <textarea id="message" placeholder="Message..."></textarea>
            <span class="err-msg" id="message-err">Message zaroor likhein</span>
        </div>

        <button class="send-btn" onclick="sendForm()">Send Message</button>

        <div class="success-msg" id="success">
            Message send ho gaya! Jald reply karunga.
        </div>

    </div>

    <script>
        function sendForm() {
            var ok = true;

            var fields = ['name', 'subject', 'message'];
            fields.forEach(function(f) {
                var el = document.getElementById(f);
                var er = document.getElementById(f + '-err');
                if (!el.value.trim()) {
                    el.style.borderColor = '#f87171';
                    er.style.display = 'block';
                    ok = false;
                } else {
                    el.style.borderColor = 'rgba(255,255,255,0.15)';
                    er.style.display = 'none';
                }
            });

            var email = document.getElementById('email');
            var emailErr = document.getElementById('email-err');
            var emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
            if (!emailOk) {
                email.style.borderColor = '#f87171';
                emailErr.style.display = 'block';
                ok = false;
            } else {
                email.style.borderColor = 'rgba(255,255,255,0.15)';
                emailErr.style.display = 'none';
            }

            if (ok) {
                document.getElementById('success').style.display = 'block';
                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('subject').value = '';
                document.getElementById('message').value = '';
            }
        }
    </script>

</body>
</html>
